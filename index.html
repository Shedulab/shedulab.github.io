<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legal · Study Flow</title>
    <style>
      :root { --bg:#f6f1e7; --card:#fff; --text:#1f2421; --soft:#5c6360; --accent:#0f766e; --border:#e4ddcf; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--text);
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.6; }
      .wrap { max-width:640px; margin:0 auto; padding:60px 22px; }
      .eyebrow { text-transform:uppercase; letter-spacing:1.4px; font-size:12px; font-weight:800; color:var(--accent); margin:0 0 8px; }
      h1 { font-size:30px; margin:0 0 6px; }
      p.sub { color:var(--soft); margin:0 0 28px; }
      a.tile { display:block; background:var(--card); border:1px solid var(--border); border-radius:18px;
        padding:20px 22px; margin-bottom:14px; text-decoration:none; color:var(--text); }
      a.tile strong { display:block; color:var(--accent); font-size:18px; margin-bottom:4px; }
      a.tile span { color:var(--soft); font-size:14px; }
      footer { margin-top:32px; color:var(--soft); font-size:13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="eyebrow">Study Flow</p>
      <h1>Legal</h1>
      <p class="sub">Policies that apply when you use Study Flow.</p>

      <a class="tile" href="./privacy.html">
        <strong>Privacy Policy</strong>
        <span>How we collect, use, and protect your data.</span>
      </a>
      <a class="tile" href="./terms.html">
        <strong>Terms of Use</strong>
        <span>The terms that govern your use of the app.</span>
      </a>

      <footer>
        <p>Operated by Shedulab · <a href="mailto:info@shedulab.com">info@shedulab.com</a></p>
      </footer>
    </div>
  </body>
</html>
